<!-- Custom CSS -->
<link rel="stylesheet" href="/assets/css/custom.css">

<!-- GoatCounter visitor tracking -->
{% if site.goatcounter_code %}
<script data-goatcounter="https://{{ site.goatcounter_code }}.goatcounter.com/count"
        async src="//gc.zgo.at/count.js"></script>
{% endif %}

<!-- Dark mode toggle button + logic -->
<script>
  // Runs before page paint to avoid flash
  (function() {
    var saved = localStorage.getItem('theme');
    if (saved === 'dark') document.documentElement.classList.add('dark-mode-early');
  })();
</script>

<style>
  /* Prevent flash of wrong theme */
  html.dark-mode-early body { background: #1a1a2e !important; }
</style>

<script defer>
  document.addEventListener('DOMContentLoaded', function() {
    // Apply saved preference
    var saved = localStorage.getItem('theme');
    if (saved === 'dark') {
      document.body.classList.add('dark-mode');
    } else if (saved === 'light') {
      document.body.classList.add('light-mode');
    }

    // Inject toggle button
    var btn = document.createElement('button');
    btn.id = 'dark-toggle';
    btn.title = 'Toggle dark / light mode';
    btn.textContent = document.body.classList.contains('dark-mode') ? '☀️' : '🌙';
    document.body.appendChild(btn);

    btn.addEventListener('click', function() {
      var isDark = document.body.classList.toggle('dark-mode');
      document.body.classList.toggle('light-mode', !isDark);
      localStorage.setItem('theme', isDark ? 'dark' : 'light');
      btn.textContent = isDark ? '☀️' : '🌙';
    });
  });
</script>
