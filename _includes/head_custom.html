<!-- Custom CSS -->
<link rel="stylesheet" href="/assets/css/custom.css">

<!-- GoatCounter visitor tracking -->
{% if site.goatcounter_code %}
<script data-goatcounter="https://{{ site.goatcounter_code }}.goatcounter.com/count"
        async src="//gc.zgo.at/count.js"></script>
{% endif %}

<!-- Dark mode: apply saved preference immediately to avoid flash -->
<script>
  if (localStorage.getItem('theme') === 'dark') {
    document.documentElement.style.backgroundColor = '#1a1a2e';
  }
</script>

<!-- Dark mode toggle: inject button after page loads -->
<script>
  window.addEventListener('load', function () {
    // Apply saved theme
    var saved = localStorage.getItem('theme');
    if (saved === 'dark') {
      document.body.classList.add('dark-mode');
    } else if (saved === 'light') {
      document.body.classList.add('light-mode');
    }

    // Create toggle button
    var btn = document.createElement('button');
    btn.id = 'dark-toggle';
    btn.setAttribute('title', 'Toggle dark/light mode');
    btn.setAttribute('aria-label', 'Toggle dark/light mode');

    function updateIcon() {
      btn.textContent = document.body.classList.contains('dark-mode') ? '☀️' : '🌙';
    }
    updateIcon();

    btn.addEventListener('click', function () {
      var nowDark = document.body.classList.toggle('dark-mode');
      document.body.classList.toggle('light-mode', !nowDark);
      localStorage.setItem('theme', nowDark ? 'dark' : 'light');
      updateIcon();
    });

    document.body.appendChild(btn);
  });
</script>
